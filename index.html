<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

  :root {
    --pink: #ff6b9d;
    --pink-light: #ffa2c4;
    --pink-pale: #fff0f5;
    --purple: #c77dff;
    --purple-light: #e0aaff;
    --purple-pale: #f3e8ff;
    --mint: #5dd9a3;
    --mint-light: #a8f0d0;
    --mint-pale: #e8fdf4;
    --yellow: #ffe66d;
    --yellow-light: #fff3b0;
    --blue: #74c0fc;
    --blue-pale: #e8f4ff;
    --card: #ffffff;
    --text: #5a4a6a;
    --text-light: #9a8aaa;
    --bg: #faf6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== ヘッダー ========== */
  .header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--purple-light);
  }

  .header-inner {
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    height: 44px;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .header-logo:hover {
    transform: scale(1.05);
  }

  .header-nav {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
  }

  .header-nav a {
    text-decoration: none;
    color: var(--text);
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 16px;
    border-radius: 20px;
    transition: all 0.3s;
    background: transparent;
    white-space: nowrap;
  }

  .header-nav a:hover {
    background: var(--purple-pale);
    color: var(--purple);
  }

  /* ========== ヒーローセクション ========== */
  .hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 520px;
    background: linear-gradient(170deg, var(--purple-pale) 0%, var(--pink-pale) 40%, var(--blue-pale) 70%, var(--mint-pale) 100%);
    text-align: center;
    padding: 20px;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(199,125,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(255,107,157,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(93,217,163,0.06) 0%, transparent 50%);
    animation: shimmer 8s ease-in-out infinite alternate;
  }

  @keyframes shimmer {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-2%, -1%); }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: min(620px, 92vw);
  }

  .hero-logo {
    width: min(540px, 88vw);
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 12px rgba(199,125,255,0.2));
    animation: floatLogo 4s ease-in-out infinite;
  }

  @keyframes floatLogo {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .hero-catchcopy {
    font-size: clamp(0.85rem, 2.5vw, 1.05rem);
    color: var(--text-light);
    margin-bottom: 24px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* ========== べあーず集合アニメーション ========== */
  .hero-bears-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    will-change: opacity, transform;
  }

  .hero-bear {
    position: absolute;
    opacity: 0;
    will-change: transform, opacity;
  }

  .hero-bear-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 3px 8px rgba(199,125,255,0.25));
    will-change: transform;
    transform-origin: 50% 92%;
  }

  @keyframes gatherInBurst {
    0% {
      opacity: 0;
      transform: translate(var(--fx, 0px), var(--fy, 0px)) rotate(var(--rotation, 0deg));
    }
    18% {
      opacity: 1;
    }
    68% {
      opacity: 1;
      transform: translate(0, 0) rotate(var(--rotation, 0deg));
    }
    100% {
      opacity: 1;
      transform: translate(0, 0) rotate(var(--rotation, 0deg));
    }
  }

  @keyframes bearPopStep {
    0% {
      transform: scale(0.12);
    }
    68% {
      transform: scale(1.08);
    }
    79% {
      transform: translate(var(--wiggle-x, 0px), 0) rotate(var(--wiggle-tilt, 0deg)) scale(0.98);
    }
    91% {
      transform: translate(var(--wiggle-x-back, 0px), 0) rotate(var(--wiggle-tilt-back, 0deg)) scale(1.03);
    }
    97% {
      transform: translate(var(--wiggle-x-settle, 0px), 0) rotate(var(--wiggle-tilt-settle, 0deg)) scale(1);
    }
    100% {
      transform: translate(0, 0) rotate(0deg) scale(1);
    }
  }

  /* ========== スクロールインジケーター ========== */
  .scroll-indicator {
    position: absolute;
    right: 20px;
    bottom: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 2;
    transition: opacity 0.15s;
  }

  .scroll-text {
    writing-mode: vertical-rl;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.12em;
  }

  .scroll-line {
    width: 1.5px;
    height: 36px;
    background: var(--purple-light);
    border-radius: 1px;
    position: relative;
    overflow: hidden;
  }

  .scroll-line::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--purple);
    animation: scrollFlow 1.5s ease-in-out infinite;
  }

  @keyframes scrollFlow {
    0% { top: -100%; }
    100% { top: 100%; }
  }

  /* ========== 星キラキラ装飾 ========== */
  .sparkle {
    position: absolute;
    width: 12px;
    height: 12px;
    opacity: 0;
    animation: sparkleAnim 3s ease-in-out infinite;
  }

  .sparkle::before, .sparkle::after {
    content: '';
    position: absolute;
    background: var(--yellow);
    border-radius: 2px;
  }

  .sparkle::before {
    width: 100%;
    height: 3px;
    top: 50%;
    transform: translateY(-50%);
  }

  .sparkle::after {
    width: 3px;
    height: 100%;
    left: 50%;
    transform: translateX(-50%);
  }

  .sparkle:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: 25%; right: 12%; animation-delay: 0.8s; }
  .sparkle:nth-child(3) { top: 60%; left: 8%; animation-delay: 1.6s; }
  .sparkle:nth-child(4) { top: 70%; right: 15%; animation-delay: 0.4s; }
  .sparkle:nth-child(5) { top: 40%; left: 20%; animation-delay: 2s; }
  .sparkle:nth-child(6) { top: 80%; right: 25%; animation-delay: 1.2s; }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50% { opacity: 0.7; transform: scale(1) rotate(45deg); }
  }

  /* ========== コンテンツセクション ========== */
  .contents-section {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 20px 64px;
  }

  .section-title {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  .section-title h2 {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-title-sub {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 4px;
  }

  .section-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--purple-light), var(--pink-light));
    border-radius: 3px;
    margin: 12px auto 0;
  }

  /* ========== コンテンツカード ========== */
  .content-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 28px;
  }

  .content-card {
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(199,125,255,0.1);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    transform: translateY(30px);
    display: flex;
    flex-direction: column;
  }

  .content-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .content-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 36px rgba(199,125,255,0.2);
  }

  .card-image-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }

  .card-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;

  }

  .content-card:hover .card-image-wrapper img {

  .card-image-bg {

  .card-image-bg.bg-pink { background: linear-gradient(135deg, var(--pink-pale), #ffe8f0); }
  .card-image-bg.bg-purple { background: linear-gradient(135deg, var(--purple-pale), #ede0ff); }
  .card-image-bg.bg-mint { background: linear-gradient(135deg, var(--mint-pale), #d4f7e8); }

  .card-image-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.08));
    transition: transform 0.5s;
  }

  .content-card:hover .card-image-bg img {
    transform: scale(1.1) rotate(-2deg);
  }

  .card-body {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-label {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 12px;
    margin-bottom: 8px;
    width: fit-content;
  }

  .label-pink { background: var(--pink-pale); color: var(--pink); }
  .label-purple { background: var(--purple-pale); color: var(--purple); }
  .label-mint { background: var(--mint-pale); color: var(--mint); }

  .card-title {
    font-size: 1.2rem;
    font-weight: 900;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--text-light);
    line-height: 1.7;
    flex: 1;
  }

  .card-arrow {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--purple);
    transition: gap 0.3s;
  }

  .content-card:hover .card-arrow {
    gap: 10px;
  }

  .card-arrow-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    background: var(--purple-pale);
    border-radius: 50%;
    font-size: 0.7rem;
    transition: background 0.3s;
  }

  .content-card:hover .card-arrow-icon {
    background: var(--purple);
    color: white;
  }

  /* ========== フッター ========== */
  .footer {
    background: linear-gradient(180deg, var(--bg) 0%, var(--purple-pale) 100%);
    text-align: center;
    padding: 40px 20px 32px;
    border-top: 2px solid var(--purple-light);

  .footer-bears {

  .footer-links {

    justify-content: center;

  .footer-links a {

  .footer-copy {

  /* ========== レスポンシブ ========== */
  @media (max-width: 640px) {
    .header-inner {

    }

    .header-logo {

    }

    .header-nav {

    .header-nav a {

    .hero {

    .content-cards {

      gap: 20px;
    }

    .contents-section {
      padding: 32px 16px 48px;
    }
  }

  @media (min-width: 641px) and (max-width: 900px) {
    .content-cards {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  /* ========== 波型セクション区切り ========== */
  .wave-divider {
    width: 100%;
    line-height: 0;
    margin-top: -1px;
  }

  .wave-divider svg {
    width: 100%;
    height: 40px;
    display: block;
  }
</style>

<script>
  let heroBearsHasEntered = false;

  function prepareHeroBears(container) {
    if (!container || container.dataset.prepared === 'true') return;

    Array.from(container.querySelectorAll('img.hero-bear')).forEach((img) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'hero-bear';
      img.classList.remove('hero-bear');
      img.classList.add('hero-bear-image');
      img.parentNode.insertBefore(wrapper, img);
      wrapper.appendChild(img);
    });

    container.dataset.prepared = 'true';
  }

  function setBearsStartState(bears) {
    bears.forEach((bear) => {
      const bearImage = bear.querySelector('.hero-bear-image');
      bear.style.animation = 'none';
      bear.style.opacity = '0';
      bear.style.transform = 'translate(var(--fx, 0px), var(--fy, 0px)) rotate(var(--rotation, 0deg))';

      if (bearImage) {
        bearImage.style.animation = 'none';
        bearImage.style.transform = 'scale(0.12)';
      }
    });
  }

  function setBearsFinalState(bears) {
    bears.forEach((bear) => {
      const bearImage = bear.querySelector('.hero-bear-image');
      bear.style.animation = 'none';
      bear.style.opacity = '1';
      bear.style.transform = 'translate(0, 0) rotate(var(--rotation, 0deg))';

      if (bearImage) {
        bearImage.style.animation = 'none';
        bearImage.style.transform = 'translate(0, 0) rotate(0deg) scale(1)';
      }
    });
  }

  // ========== べあーず円形配置 ==========
  function setupBears() {
    const hero = document.querySelector('.hero');
    const container = document.getElementById('hero-bears');
    if (!container || !hero) return;

    prepareHeroBears(container);

    const bears = Array.from(container.querySelectorAll('.hero-bear'));

    // offsetWidth/Height はアニメーション・スクロールに影響されない純粋なレイアウトサイズ
    const W = hero.offsetWidth;
    const H = hero.offsetHeight;

    // べあーずのサイズ（画面幅に応じて調整）
    const bearSize = W > 900 ? 143 : W > 640 ? 120 : 87;

    // 楕円の中心 = ヒーローセクションの中央（flexで hero-content がここに配置される）
    const cx = W / 2;
    const cy = H / 2 + Math.min(H * 0.035, 18);

    // 楕円の半径を少し広げて、べあーず同士の重なりを減らす
    const rx = Math.min(W * 0.49, 455);
    const ry = Math.min(H * 0.45, 235);

    // 配置する弧の範囲: 下左(-225°) → 上(-90°) → 下右(45°)
    // ※角度はCSS座標系(右=0°, 下=90°)
    const startAngle = -228;
    const endAngle = 48;
    const n = bears.length;
    const arcSamples = Math.max(240, n * 24);
    const sampledArc = [];
    let totalArcLength = 0;

    for (let s = 0; s <= arcSamples; s++) {
      const t = s / arcSamples;
      const angleDeg = startAngle + t * (endAngle - startAngle);
      const angleRad = angleDeg * Math.PI / 180;
      const x = cx + rx * Math.cos(angleRad);
      const y = cy + ry * Math.sin(angleRad);

      if (sampledArc.length > 0) {
        const prev = sampledArc[sampledArc.length - 1];
        totalArcLength += Math.hypot(x - prev.x, y - prev.y);
      }

      sampledArc.push({ angleRad, x, y, arcLength: totalArcLength });
    }

    let sampleCursor = 1;

    bears.forEach((bear, i) => {
      const bearImage = bear.querySelector('.hero-bear-image');
      const targetArcLength = n > 1 ? (totalArcLength * i) / (n - 1) : totalArcLength / 2;

      while (sampleCursor < sampledArc.length - 1 && sampledArc[sampleCursor].arcLength < targetArcLength) {
        sampleCursor += 1;
      }

      const prevPoint = sampledArc[Math.max(0, sampleCursor - 1)];
      const nextPoint = sampledArc[sampleCursor];
      const segmentLength = nextPoint.arcLength - prevPoint.arcLength || 1;
      const segmentT = Math.min(Math.max((targetArcLength - prevPoint.arcLength) / segmentLength, 0), 1);
      const angleRad = prevPoint.angleRad + (nextPoint.angleRad - prevPoint.angleRad) * segmentT;

      // 弧の長さベースで均等になるよう補間した位置
      const bx = prevPoint.x + (nextPoint.x - prevPoint.x) * segmentT;
      const by = prevPoint.y + (nextPoint.y - prevPoint.y) * segmentT;

      bear.style.width = bearSize + 'px';
      bear.style.height = bearSize + 'px';
      bear.style.left = (bx - bearSize / 2) + 'px';
      bear.style.top = (by - bearSize / 2) + 'px';

      // 頭が中心を向くよう回転角を計算
      // rotate(atan2(dx, -dy)) で「上」が中心方向を向く
      const dx = cx - bx;
      const dy = cy - by;
      const rotDeg = Math.atan2(dx, -dy) * 180 / Math.PI;

      // アニメーション開始位置: 弧のさらに外側から最終位置へ一斉に飛び込んでくる
      const outFactor = 2.25;
      const fxPx = (bx - cx) * outFactor;
      const fyPx = (by - cy) * outFactor;
      const wiggleX = (i % 2 === 0 ? 1 : -1) * Math.max(6, bearSize * 0.06);
      const wiggleTilt = (i % 2 === 0 ? 1 : -1) * 8.5;
      const wiggleXBack = wiggleX * -0.85;
      const wiggleTiltBack = wiggleTilt * -0.82;
      const wiggleXSettle = wiggleX * 0.24;
      const wiggleTiltSettle = wiggleTilt * 0.28;

      bear.style.setProperty('--rotation', rotDeg.toFixed(1) + 'deg');
      bear.style.setProperty('--fx', fxPx.toFixed(0) + 'px');
      bear.style.setProperty('--fy', fyPx.toFixed(0) + 'px');
      bear.style.setProperty('--wiggle-x', wiggleX.toFixed(0) + 'px');
      bear.style.setProperty('--wiggle-tilt', wiggleTilt.toFixed(1) + 'deg');
      bear.style.setProperty('--wiggle-x-back', wiggleXBack.toFixed(1) + 'px');
      bear.style.setProperty('--wiggle-tilt-back', wiggleTiltBack.toFixed(1) + 'deg');
      bear.style.setProperty('--wiggle-x-settle', wiggleXSettle.toFixed(1) + 'px');
      bear.style.setProperty('--wiggle-tilt-settle', wiggleTiltSettle.toFixed(1) + 'deg');

      // アニメーション設定（一斉に集合 → 足元を軸にゆっくり左右へステップ）
      bear.style.animation = 'none';
      if (bearImage) bearImage.style.animation = 'none';
      // reflow を挟んでアニメーションをリセット
      bear.offsetHeight; // eslint-disable-line
      bear.style.animation = 'gatherInBurst 1.28s cubic-bezier(0.22, 1, 0.36, 1) forwards';
      if (bearImage) bearImage.style.animation = 'bearPopStep 1.28s cubic-bezier(0.22, 1, 0.36, 1) forwards';
    });

    if (heroBearsHasEntered) {
      setBearsFinalState(bears);
    } else {
      setBearsStartState(bears);
    }
  }

  // 画像ロード完了後に初期化（ロゴ画像のサイズが確定してから中心座標を計算するため）
  window.addEventListener('load', () => {
    setupBears();
    playBearsEntrance();

    // リサイズ時に再配置
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(setupBears, 150);
    });
  });

  // ========== スクロールでべあーずフェードアウト ==========
  function playBearsEntrance() {
    if (heroBearsHasEntered || document.visibilityState !== 'visible') return;

    const container = document.getElementById('hero-bears');
    if (!container) return;

    const bears = Array.from(container.querySelectorAll('.hero-bear'));
    if (!bears.length) return;

    heroBearsHasEntered = true;
    setBearsStartState(bears);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bears.forEach((bear) => {
          const bearImage = bear.querySelector('.hero-bear-image');
          bear.style.animation = 'gatherInBurst 1.28s cubic-bezier(0.22, 1, 0.36, 1) forwards';
          if (bearImage) bearImage.style.animation = 'bearPopStep 1.28s cubic-bezier(0.22, 1, 0.36, 1) forwards';
        });
      });
    });
  }

  document.addEventListener('visibilitychange', () => {
    playBearsEntrance();
  });

  const heroBears = document.getElementById('hero-bears');
  const scrollIndicator = document.getElementById('scroll-indicator');
  const hero = document.querySelector('.hero');

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const heroH = hero.offsetHeight;
    const p = Math.min(scrollY / (heroH * 0.5), 1);
    heroBears.style.opacity = 1 - p;
    heroBears.style.transform = `scale(${1 - p * 0.3}) translateY(${-p * 40}px)`;
    scrollIndicator.style.opacity = 1 - p * 3;
  });

  // ========== コンテンツカードフェードイン ==========
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.content-card').forEach((card, i) => {
    card.style.transitionDelay = `${i * 0.12}s`;
    observer.observe(card);
  });
</script>

</body>
</html>
